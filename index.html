<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talks — SciPy India</title>
  <link rel="stylesheet" href="style.css">
  <style>
.page-header {
  margin-bottom: 0;
  border-radius: 0;
}

.page-header .page-subtitle a {
  color: rgba(255, 255, 255, 0.85);
  text-decoration: underline;
}

main.container {
  padding-top: 3rem;
  padding-bottom: 3rem;
}

.talks-grid {
  display: grid;
  gap: 1.25rem;
  margin-top: 1.5rem;
}

.talk-card {
  display: block;
  background: var(--bg-white);
  border-radius: var(--border-radius);
  padding: 1.5rem;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--primary-blue);
  text-decoration: none;
  color: inherit;
  transition: var(--transition);
}

.talk-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

.talk-card--upcoming {
  border-left-color: var(--accent-yellow);
}

.talk-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}

.talk-date {
  font-size: 0.85rem;
  color: var(--primary-blue);
  font-weight: 500;
}

.talk-badges {
  display: flex;
  gap: 0.4rem;
}

.talk-badge {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.talk-badge.upcoming {
  background: var(--light-blue);
  color: var(--primary-blue);
  border: 1px solid var(--primary-blue);
}

.talk-badge.draft {
  background: rgba(251, 191, 36, 0.12);
  color: #92620a;
  border: 1px solid rgba(251, 191, 36, 0.5);
}

.talk-title {
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--dark-blue);
  margin-bottom: 0.4rem;
  line-height: 1.3;
}

.talk-event {
  font-size: 0.9rem;
  color: var(--text-light);
}

.talk-topic {
  display: inline-block;
  margin-top: 0.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--primary-blue);
  background: var(--light-blue);
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
}

footer .footer-links a {
  color: white;
}

  </style>
</head>
<body>
  <div class="page-header">
    <div class="container">
      <h1 class="page-title">Talks</h1>
      <p class="page-subtitle">Conference and meetup talks by the <a href="https://scipy-india.github.io" target="_blank">SciPy India</a> community</p>
    </div>
  </div>

  <main class="container">
    <h2 class="section-title">All Talks</h2>
    <div class="talks-grid">

      <a href="/slides/pyconf-hyd-community-partner-showcase-03-2026/" class="talk-card">
        <div class="talk-card-header">
          <div class="talk-date">Mar 2026</div>
          
        </div>
        <h2 class="talk-title">SciPy India: Building Scientific Community in India</h2>
        <div class="talk-event">Pyconf Hyd</div>
        <div class="talk-topic">Community Partner Showcase</div>
      </a>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-links">
        <a href="https://github.com/scipy-india" target="_blank">GitHub</a>
        <a href="https://scipy-india.github.io" target="_blank">Website</a>
      </div>
      <div class="footer-bottom">
        <p>SciPy India</p>
      </div>
    </div>
  </footer>
</body>
</html>
